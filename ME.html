<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Website</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#f4f4f4;
        }

        header{
            background:#0077cc;
            color:white;
            padding:20px;
            text-align:center;
        }

        nav{
            background:#222;
            padding:10px;
            text-align:center;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin:15px;
        }

        .container{
            width:80%;
            margin:30px auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        button{
            background:#0077cc;
            color:white;
            padding:10px 20px;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#005fa3;
        }

        footer{
            background:#222;
            color:white;
            text-align:center;
            padding:15px;
            margin-top:30px;
        }
    </style>
</head>
<body>

<header>
    <h1>Welcome to My Website</h1>
    <p>Learning HTML, CSS & JavaScript</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Projects</a>
    <a href="#">Contact</a>
</nav>

<div class="container">
    <h2>Hello Bhanu 👋</h2>
    <p>This is a simple HTML webpage.</p>

    <button onclick="showMessage()">
        Click Me
    </button>

    <p id="result"></p>
</div>

<footer>
    © 2026 SK. Ashwak | All Rights Reserved
</footer>

<script>
function showMessage(){
    document.getElementById("result").innerHTML =
    "🚀 Welcome to Web Development!";
}
</script>

</body>
</html>
